@if (project(); as p) {
  <section class="detail-hero" [style.background-image]="'url(' + (resolvedThumbnail() || p.thumbnail) + ')'">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-year">{{ p.year }}</span>
      <h1>{{ p.title }}</h1>
      <div class="hero-divider"></div>
    </div>
  </section>

  <section class="detail-content">
    <div class="container">
      <div class="content-header">
        <a routerLink="/proyectos" class="back-link">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Volver a Proyectos</span>
        </a>
      </div>

      @if (p.description) {
        <div class="description-wrapper">
          <div class="description-label">
            <span class="label-text">Sobre el proyecto</span>
            <span class="label-line"></span>
          </div>
          <p class="project-description">{{ p.description }}</p>
        </div>
      }

      <div class="gallery-grid">
        @for (image of p.images; track image.url) {
          <div class="gallery-item"
               [class.gallery-item--wide]="image.cols && image.cols >= 6"
               (click)="openLightbox(image.url)">
            <app-img [src]="image.url" [alt]="image.alt" />
            <div class="gallery-hover">
              <i class="fa-solid fa-expand"></i>
            </div>
          </div>
        }
      </div>
    </div>
  </section>

  @if (lightboxImage(); as imgUrl) {
    <div class="lightbox" (click)="closeLightbox()">
      <button class="lightbox-close" aria-label="Cerrar">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <img [src]="imgUrl" alt="Vista ampliada" (click)="$event.stopPropagation()" />
    </div>
  }

  <app-footer />
} @else {
  <div class="not-found">
    <h2>Proyecto no encontrado</h2>
    <a routerLink="/proyectos">
      <i class="fa-solid fa-arrow-left"></i>
      Volver a proyectos
    </a>
  </div>
}
