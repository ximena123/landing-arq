@if (project(); as p) {
  <section class="detail-hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>{{ p.title }}</h1>
      <span class="year">{{ p.year }}</span>
    </div>
  </section>

  <section class="detail-gallery">
    <div class="container">
      <a routerLink="/proyectos" class="back-link">
        <i class="fa-solid fa-arrow-left"></i> Volver a Proyectos
      </a>

      @if (p.description) {
        <p class="project-description">{{ p.description }}</p>
      }

      <div class="row g-3 mt-3">
        @for (image of p.images; track image.url) {
          <div [class]="getColClass(image.cols)">
            <div class="gallery-item" (click)="openLightbox(image.url)">
              <img [src]="image.url" [alt]="image.alt" loading="lazy" />
              <div class="gallery-overlay">
                <i class="fa-solid fa-expand"></i>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </section>

  @if (lightboxImage(); as imgUrl) {
    <div class="lightbox" (click)="closeLightbox()">
      <button class="lightbox-close" aria-label="Cerrar">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <img [src]="imgUrl" alt="Vista ampliada" (click)="$event.stopPropagation()" />
    </div>
  }

  <app-footer />
} @else {
  <div class="not-found">
    <h2>Proyecto no encontrado</h2>
    <a routerLink="/proyectos">Volver a proyectos</a>
  </div>
}
