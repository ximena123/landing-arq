@if (content(); as c) {
  <section class="projects-hero">
    <div class="hero-content">
      <div class="hero-label">
        <span class="label-line"></span>
        <span class="label-text">Portafolio</span>
        <span class="label-line"></span>
      </div>
      <h1>Proyectos</h1>
    </div>
  </section>

  <section class="projects-section">
    <div class="projects-grid">
      @for (project of c.projects; track project.id; let i = $index) {
        <a [routerLink]="['/proyecto', project.id]"
           class="project-item"
           [class.project-item--tall]="i % 4 === 0 || i % 4 === 3">
          <div class="project-img">
            <app-img [src]="project.thumbnail" [alt]="project.title" />
          </div>
          <div class="project-info">
            <h3 class="project-name">{{ project.title }}</h3>
            <span class="project-meta">{{ project.year }}</span>
          </div>
        </a>
      }
    </div>
  </section>

  <app-footer />
}
