@if (content(); as c) {
  <section class="counter-section">
    <div class="container">
      <div class="counter-grid">
        @for (counter of c.counters; track counter.id; let last = $last) {
          <div class="counter-item">
            <span class="counter-value">
              {{ counter.prefix }}{{ getAnimatedValue(counter.id, counter.value) }}
            </span>
            <span class="counter-divider-h"></span>
            <span class="counter-label">{{ counter.label }}</span>
          </div>
          @if (!last) {
            <div class="counter-divider"></div>
          }
        }
      </div>
    </div>
  </section>
}
