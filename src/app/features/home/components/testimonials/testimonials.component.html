@if (content(); as c) {
  <section class="testimonials-section">
    <div class="container">
      <div class="testimonials-layout">
        <div class="testimonials-label">
          <span class="label-text">Testimonios</span>
          <span class="label-line"></span>
        </div>
        <div class="testimonials-content">
          <div class="testimonial-carousel">
            @for (testimonial of c.testimonials; track testimonial.id; let i = $index) {
              <div class="testimonial-slide" [class.active]="i === currentIndex()">
                <div class="testimonial-card">
                  <p class="testimonial-text">&ldquo;{{ testimonial.text }}&rdquo;</p>
                  <div class="testimonial-author">
                    <span class="author-line"></span>
                    <span class="author-name">{{ testimonial.name }}</span>
                  </div>
                </div>
              </div>
            }
          </div>

          <div class="carousel-controls">
            <button (click)="prev()" class="carousel-btn" aria-label="Anterior">
              <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="carousel-indicator">
              <span class="current">{{ currentIndex() + 1 }}</span>
              <span class="separator">&mdash;</span>
              <span class="total">{{ c.testimonials.length }}</span>
            </div>
            <button (click)="next()" class="carousel-btn" aria-label="Siguiente">
              <i class="fa-solid fa-arrow-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
}
