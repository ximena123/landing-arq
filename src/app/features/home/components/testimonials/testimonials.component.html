@if (content(); as c) {
  <section class="testimonials-section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">Testimonios</h2>
        <div class="title-divider"></div>
      </div>

      <div class="testimonial-carousel">
        @for (testimonial of c.testimonials; track testimonial.id; let i = $index) {
          <div class="testimonial-slide" [class.active]="i === currentIndex()">
            <div class="testimonial-card">
              <i class="fa-solid fa-quote-left quote-icon"></i>
              <p class="testimonial-text">{{ testimonial.text }}</p>
              <div class="testimonial-author">
                <span class="author-avatar">{{ testimonial.name.charAt(0) }}</span>
                <span class="author-name">{{ testimonial.name }}</span>
              </div>
            </div>
          </div>
        }

        <div class="carousel-controls">
          <button (click)="prev()" class="carousel-btn" aria-label="Anterior">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <div class="carousel-dots">
            @for (t of c.testimonials; track t.id; let i = $index) {
              <button
                class="dot"
                [class.active]="i === currentIndex()"
                (click)="goTo(i)"
                [attr.aria-label]="'Ir a testimonio ' + (i + 1)"
              ></button>
            }
          </div>
          <button (click)="next()" class="carousel-btn" aria-label="Siguiente">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
        </div>
      </div>
    </div>
  </section>
}
