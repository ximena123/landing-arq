@if (content(); as c) {
  <section id="portfolio" class="portfolio-section">
    <div class="container-fluid px-0">
      <div class="portfolio-header">
        <div class="header-label">
          <span class="label-line"></span>
          <span class="label-text">Proyectos</span>
          <span class="label-line"></span>
        </div>
        <h2 class="portfolio-heading">Portafolio</h2>
      </div>
      <div class="portfolio-grid">
        @for (item of c.portfolio; track item.id; let i = $index) {
          <div class="portfolio-card"
               [class.portfolio-card--featured]="i === 0">
            <app-img [src]="item.image" [alt]="item.title" />
            <div class="portfolio-overlay">
              <div class="portfolio-info">
                <span class="portfolio-category">{{ item.category }}</span>
                <h3 class="portfolio-title">{{ item.title }}</h3>
              </div>
            </div>
          </div>
        }
      </div>
      <div class="portfolio-action">
        <a routerLink="/proyectos" class="btn-view-all">
          <span>Ver Todos los Proyectos</span>
          <span class="btn-line"></span>
        </a>
      </div>
    </div>
  </section>
}
