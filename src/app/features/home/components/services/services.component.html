@if (content(); as c) {
  <section id="services" class="services-section">
    <div class="container">
      <div class="services-header">
        <div class="header-label">
          <span class="label-line"></span>
          <span class="label-text">Servicios</span>
          <span class="label-line"></span>
        </div>
        <h2 class="services-title">Lo que hacemos</h2>
      </div>
      <div class="services-grid">
        @for (service of c.services; track service.id) {
          <div class="service-card">
            <div class="service-bg" [style.background-image]="'url(' + getBgUrl(service.id, service.backgroundImage) + ')'"></div>
            <div class="service-overlay"></div>
            <div class="service-content">
              <div class="service-icon">
                <i class="fa-solid {{ service.icon }}"></i>
              </div>
              <h3 class="service-title">{{ service.title }}</h3>
              <p class="service-desc">{{ service.description }}</p>
            </div>
          </div>
        }
      </div>
    </div>
  </section>
}
