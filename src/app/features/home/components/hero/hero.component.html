@if (content(); as c) {
  <section id="hero" class="hero-section" [style.background-image]="'url(' + bgUrl() + ')'">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      @if (logoUrl()) {
        <img [src]="logoUrl()" [alt]="c.hero.title" class="hero-logo" />
      }
      <h1 class="hero-title">{{ c.hero.title }}</h1>
      <div class="hero-divider"></div>
      <p class="hero-subtitle">{{ c.hero.subtitle }}</p>
    </div>
    <div class="hero-bottom">
      <button class="hero-scroll" (click)="scrollToAbout()">
        <span class="scroll-line"></span>
        <span class="scroll-text">Descubrir</span>
      </button>
    </div>
  </section>
}
