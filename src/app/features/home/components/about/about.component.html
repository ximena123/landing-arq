@if (content(); as c) {
  <section id="about" class="about-section">
    <div class="container">
      <div class="about-layout">
        <div class="about-label">
          <span class="label-text">Acerca de</span>
          <span class="label-line"></span>
        </div>
        <div class="about-content">
          <h2 class="about-title">{{ c.about.title }}</h2>
          <p class="about-text">{{ c.about.description }}</p>
          <blockquote class="about-quote">
            {{ c.about.highlightText }}
          </blockquote>
        </div>
      </div>
    </div>
  </section>
}
