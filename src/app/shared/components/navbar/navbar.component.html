@if (content(); as c) {
  <nav class="navbar navbar-expand-lg fixed-top" [class.navbar-scrolled]="isScrolled()">
    <div class="container">
      <a class="navbar-brand" routerLink="/">
        <img [src]="c.hero.logo" alt="Logo" class="navbar-logo" />
      </a>

      <button class="navbar-toggler" type="button" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
        <span class="toggler-icon" [class.open]="isMenuOpen()">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>

      <div class="navbar-collapse" [class.show]="isMenuOpen()">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" (click)="scrollTo('hero')">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" (click)="scrollTo('about')">Acerca de Mi</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" (click)="scrollTo('services')">Servicios</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/proyectos" (click)="closeMenu()">Portafolio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" (click)="scrollTo('current-project')">Proyecto en Curso</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" (click)="scrollTo('contact')">Contacto</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
}
